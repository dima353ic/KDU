name: Build KDU

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build KDU
      run: msbuild Source\kdu.sln /m /p:Configuration=Release /p:Platform=x64 /p:SpectreMitigation=false /p:PlatformToolset=v143

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KDU-Compiled
        path: |
          **\Release\*.exe
          **\Release\*.dll
